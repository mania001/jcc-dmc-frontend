AWSTemplateFormatVersion: '2010-09-09'
Description: JCC DMC Frontend - S3 + CloudFront

# -------------------------------------------------------
# 파라미터
#   지금: DomainName, AcmCertificateArn 비워두고 배포
#   나중: 두 값 채워서 업데이트하면 커스텀 도메인 적용
# -------------------------------------------------------
Parameters:
  DomainName:
    Type: String
    Default: ''
    Description: '커스텀 도메인 (예: give.jcc.or.kr) — 없으면 비워두세요'

  AcmCertificateArn:
    Type: String
    Default: ''
    Description: 'ACM 인증서 ARN (us-east-1) — 도메인 적용 시 필요'

# -------------------------------------------------------
# 조건
# -------------------------------------------------------
Conditions:
  HasCustomDomain: !And
    - !Not [!Equals [!Ref DomainName, '']]
    - !Not [!Equals [!Ref AcmCertificateArn, '']]

# -------------------------------------------------------
# 리소스
# -------------------------------------------------------
Resources:

  # S3 버킷 (퍼블릭 차단 — CloudFront만 접근)
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: jcc-dmc-frontend
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # CloudFront → S3 접근 권한 (OAC 방식)
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: jcc-dmc-frontend-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # S3 버킷 정책 — CloudFront OAC만 허용
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  # CloudFront 배포
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: JCC DMC Frontend
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_200  # 한국 포함 (아시아 + 미국/유럽)

        # 커스텀 도메인 (도메인 있을 때만 적용)
        Aliases: !If
          - HasCustomDomain
          - [!Ref DomainName]
          - !Ref AWS::NoValue

        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true

        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''

        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized (AWS Managed)
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true

        # SPA 라우팅 — 403/404 → index.html
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

# -------------------------------------------------------
# 출력
# -------------------------------------------------------
Outputs:
  BucketName:
    Value: !Ref FrontendBucket
    Description: S3 버킷 이름

  CloudFrontDomain:
    Value: !GetAtt CloudFrontDistribution.DomainName
    Description: CloudFront 도메인 (지금 사용할 URL)

  CloudFrontDistributionId:
    Value: !Ref CloudFrontDistribution
    Description: 배포 스크립트의 캐시 무효화에 필요
